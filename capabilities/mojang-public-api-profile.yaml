naftiko: 1.0.0-alpha2
info:
  label: "Mojang Public API \u2014 Profile"
  description: "Mojang Public API \u2014 Profile. 2 operations. Lead operation: Get Name History (Deprecated). Self-contained Naftiko capability covering one Mojang business surface."
  tags:
  - Mojang
  - Minecraft
  - Profile
  created: '2026-05-30'
  modified: '2026-05-30'
binds:
- namespace: env
  keys:
    MOJANG_ACCESS_TOKEN: MOJANG_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: mojang-public-api-profile
    baseUri: https://api.mojang.com
    description: "Mojang Public API \u2014 profile. Self-contained, no shared references."
    resources:
    - name: user-profiles-uuid-names
      path: /user/profiles/{uuid}/names
      operations:
      - name: getNameHistory
        method: GET
        description: Get Name History (Deprecated)
        inputParameters:
        - name: uuid
          in: path
          type: string
          required: true
          description: Player UUID (with or without hyphens).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: orders-statistics
      path: /orders/statistics
      operations:
      - name: getSaleStatistics
        method: POST
        description: Get Sale Statistics
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: SKU filter.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: mojang-public-api-profile-rest
    port: 8080
    description: "REST adapter for Mojang Public API \u2014 profile. One Spectral-compliant resource per consumed operation, prefixed with /v1."
    resources:
    - path: /v1/user/profiles/{uuid}/names
      name: user-profiles-uuid-names
      description: REST surface for /user/profiles/{uuid}/names.
      operations:
      - method: GET
        name: getNameHistory
        description: Get Name History (Deprecated)
        call: mojang-public-api-profile.getNameHistory
        with:
          uuid: rest.uuid
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders/statistics
      name: orders-statistics
      description: REST surface for /orders/statistics.
      operations:
      - method: POST
        name: getSaleStatistics
        description: Get Sale Statistics
        call: mojang-public-api-profile.getSaleStatistics
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mojang-public-api-profile-mcp
    port: 9090
    transport: http
    description: "MCP adapter for Mojang Public API \u2014 profile. One tool per consumed operation, routed inline through this capability's consumes block."
    tools:
    - name: get-name-history
      description: Get Name History (Deprecated)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mojang-public-api-profile.getNameHistory
      with:
        uuid: tools.uuid
      outputParameters:
      - type: object
        mapping: $.
    - name: get-sale-statistics
      description: Get Sale Statistics
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: mojang-public-api-profile.getSaleStatistics
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
