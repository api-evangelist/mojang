naftiko: 1.0.0-alpha2
info:
  label: "Minecraft Services API \u2014 Presence"
  description: "Minecraft Services API \u2014 Presence. 1 operations. Lead operation: Report Presence. Self-contained Naftiko capability covering one Mojang business surface."
  tags:
  - Mojang
  - Minecraft
  - Presence
  created: '2026-05-30'
  modified: '2026-05-30'
binds:
- namespace: env
  keys:
    MINECRAFT_ACCESS_TOKEN: MINECRAFT_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: mojang-minecraft-services-presence
    baseUri: https://api.minecraftservices.com
    description: "Minecraft Services API \u2014 presence. Self-contained, no shared references."
    authentication:
      type: bearer
      token: '{{env.MINECRAFT_ACCESS_TOKEN}}'
    resources:
    - name: presence
      path: /presence
      operations:
      - name: reportPresence
        method: POST
        description: Report Presence
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Presence payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: mojang-minecraft-services-presence-rest
    port: 8080
    description: "REST adapter for Minecraft Services API \u2014 presence. One Spectral-compliant resource per consumed operation, prefixed with /v1."
    resources:
    - path: /v1/presence
      name: presence
      description: REST surface for /presence.
      operations:
      - method: POST
        name: reportPresence
        description: Report Presence
        call: mojang-minecraft-services-presence.reportPresence
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mojang-minecraft-services-presence-mcp
    port: 9090
    transport: http
    description: "MCP adapter for Minecraft Services API \u2014 presence. One tool per consumed operation, routed inline through this capability's consumes block."
    tools:
    - name: report-presence
      description: Report Presence
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: mojang-minecraft-services-presence.reportPresence
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
