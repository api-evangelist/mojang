naftiko: 1.0.0-alpha2
info:
  label: "Mojang Session Server \u2014 Server"
  description: "Mojang Session Server \u2014 Server. 1 operations. Lead operation: Get Blocked Servers. Self-contained Naftiko capability covering one Mojang business surface."
  tags:
  - Mojang
  - Minecraft
  - Server
  created: '2026-05-30'
  modified: '2026-05-30'
binds:
- namespace: env
  keys:
    MOJANG_ACCESS_TOKEN: MOJANG_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: mojang-session-server-server
    baseUri: https://sessionserver.mojang.com
    description: "Mojang Session Server \u2014 server. Self-contained, no shared references."
    resources:
    - name: blockedservers
      path: /blockedservers
      operations:
      - name: getBlockedServers
        method: GET
        description: Get Blocked Servers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: mojang-session-server-server-rest
    port: 8080
    description: "REST adapter for Mojang Session Server \u2014 server. One Spectral-compliant resource per consumed operation, prefixed with /v1."
    resources:
    - path: /v1/blockedservers
      name: blockedservers
      description: REST surface for /blockedservers.
      operations:
      - method: GET
        name: getBlockedServers
        description: Get Blocked Servers
        call: mojang-session-server-server.getBlockedServers
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mojang-session-server-server-mcp
    port: 9090
    transport: http
    description: "MCP adapter for Mojang Session Server \u2014 server. One tool per consumed operation, routed inline through this capability's consumes block."
    tools:
    - name: get-blocked-servers
      description: Get Blocked Servers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mojang-session-server-server.getBlockedServers
      outputParameters:
      - type: object
        mapping: $.
