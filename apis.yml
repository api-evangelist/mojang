aid: mojang
name: Mojang
description: >-
  Mojang Studios is the developer of Minecraft. The Mojang / Minecraft Services
  API surface covers Minecraft player identity (UUID and profile lookup), skins
  and capes, name history and name change, server session verification, blocked
  server lists, player attributes (privacy, chat, friends settings), friends
  graph, presence, public keys for profile signature verification, and account
  entitlements. Endpoints span three hosts: the legacy api.mojang.com, the
  session-server sessionserver.mojang.com (Yggdrasil), and the modern
  Microsoft-side api.minecraftservices.com. Most read endpoints are public and
  unauthenticated; player-account endpoints require a Bearer Minecraft access
  token obtained via the Xbox Live / XSTS authentication chain.
