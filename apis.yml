    description: >-
      Legacy public Mojang API (api.mojang.com) covering username-to-UUID
      lookup, batch UUID resolution, and historical profile endpoints. Most
      operations are being migrated to api.minecraftservices.com but remain
      live for backward compatibility.
    humanURL: https://minecraft.wiki/w/Mojang_API
    baseURL: https://api.mojang.com
    tags:
      - Identity
      - Player Profiles
      - Public
    properties:
      - type: Documentation
        url: https://minecraft.wiki/w/Mojang_API
      - type: OpenAPI
        url: openapi/mojang-public-api-openapi.yml
      - type: NaftikoCapability
        url: capabilities/mojang-public-api-identity.yaml
  - name: Mojang Session Server
    description: >-
      Mojang's Yggdrasil session server (sessionserver.mojang.com) used during
      the Minecraft login handshake. Provides the canonical skin and cape
      texture lookup keyed by player UUID, the server-side
      hasJoined verification used by Minecraft servers, the join endpoint
      used by clients, and the blocked-servers SHA-1 hash list.
    humanURL: https://minecraft.wiki/w/Mojang_API
    baseURL: https://sessionserver.mojang.com
    tags:
      - Session
      - Authentication
      - Textures
      - Server
    properties:
      - type: Documentation
        url: https://minecraft.wiki/w/Mojang_API
      - type: OpenAPI
        url: openapi/mojang-session-server-openapi.yml
      - type: NaftikoCapability
        url: capabilities/mojang-session-server-session.yaml
  - name: Minecraft Services API
    description: >-
      Modern Microsoft-managed Minecraft Services API (api.minecraftservices.com)
      covering authenticated player profile management, name change, skin and
      cape management, player attributes (chat / friends / profanity filter),
      blocklist, friends graph, presence reporting, signature keypair
      issuance, public Mojang keys, and entitlement / ownership checks.
      Requires a Minecraft Bearer access token obtained via the Xbox Live
      authentication chain for player-scoped endpoints.
    humanURL: https://minecraft.wiki/w/Mojang_API
    baseURL: https://api.minecraftservices.com
    tags:
