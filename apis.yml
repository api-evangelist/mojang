features:
  - name: Public UUID Lookup
    description: >-
      Look up a Minecraft player's UUID by username (case-insensitive)
      without authentication via /users/profiles/minecraft/{username}.
  - name: Batch UUID Resolution
    description: >-
      Resolve up to ten usernames to UUIDs in a single POST call to
      /profiles/minecraft (legacy) or /minecraft/profile/lookup/bulk/byname
      (modern).
  - name: Skin and Cape Textures
    description: >-
      Retrieve the Base64-encoded textures property for any player via
      sessionserver /session/minecraft/profile/{UUID}, optionally signed.
  - name: Server Session Verification
    description: >-
      Yggdrasil hasJoined / join handshake used by every Minecraft server
      and client to validate that a logging-in player is authenticated.
  - name: Blocked Server List
    description: >-
      SHA-1 hash list of servers Mojang has flagged, served as plain text
      from sessionserver.mojang.com/blockedservers.
  - name: Authenticated Player Profile
    description: >-
      Fetch the signed-in player's own profile including all owned skins and
      capes via /minecraft/profile with Bearer auth.
  - name: Skin and Cape Management
    description: >-
      Change, upload, reset, hide, and show skins and capes for the
      authenticated player via /minecraft/profile/skins and /capes/active.
  - name: Name Change
    description: >-
      Check name availability, query cooldown / change history, and rename
      the authenticated player via /minecraft/profile/name endpoints.
  - name: Friends and Presence
    description: >-
      Manage the player's friends graph, accept and reject requests, and
      publish presence (offline / online / playing) for friends.
  - name: Player Attributes and Blocklist
    description: >-
      Read and modify the player's profanity filter, friends preferences,
      and chat settings, and read the player blocklist.
  - name: Signature Keypair and Public Keys
    description: >-
      Issue per-player RSA signing keypairs and serve Mojang's rotating
      public keys for chat signature verification.
useCases:
  - name: Minecraft Server Authentication
    description: >-
      Minecraft Java Edition servers call sessionserver.hasJoined during the
      login handshake to validate a player's session against Mojang.
  - name: Player Skin Display
    description: >-
      Third-party sites and tools (NameMC, MinecraftSkinStealer, server lobby
      plugins) read the textures property from sessionserver to render
      player skins and capes.
  - name: Username History Tools
    description: >-
      Username history dashboards once relied on /user/profiles/{uuid}/names;
      since deprecation tools now snapshot lookups from the public name-to-
      UUID endpoint over time.
  - name: Launcher Authentication
    description: >-
      The Microsoft / Xbox Live -> XSTS -> Minecraft access-token flow
      backs the official Minecraft launcher and every third-party launcher.
  - name: Blocked Server Enforcement
    description: >-
      Client-side enforcement of Mojang's EULA blocklist by hashing the
      server address and checking it against /blockedservers.
  - name: Community Skin Galleries
    description: >-
      Skin upload sites use the authenticated skin endpoints to push player-
      selected skins to a signed-in Minecraft account.
integrations:
  - name: Xbox Live
    description: >-
      Mandatory upstream identity provider for Microsoft-era Minecraft
      accounts; supplies the XSTS token that is exchanged for a Minecraft
      access token.
  - name: Microsoft Identity Platform
    description: >-
      OAuth 2.0 device-code and authorization-code flows against
      login.microsoftonline.com originate the access token used in the Xbox
      Live chain.
  - name: Minecraft Java Edition Servers
    description: >-
      Every Java Edition server speaks the session-server protocol to
      verify joining clients.
  - name: Minecraft Realms
    description: >-
      Mojang's hosted Realms service consumes the same identity, friends,
      and presence surface for invites and join flows.
solutions:
  - name: Minecraft Account Identity
    description: >-
      Resolve, verify, and manage Minecraft player identities across the
      legacy Mojang and modern Minecraft Services APIs from a single
      surface.
  - name: Minecraft Server Session Trust
    description: >-
      Use the Yggdrasil session-verification surface plus the blocked-
      servers list to validate clients and enforce Mojang's server policy.
  - name: Player Personalization at Scale
    description: >-
      Programmatic skin, cape, profanity, and friends management for hosted
      Minecraft platforms and community tools.
